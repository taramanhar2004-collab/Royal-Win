<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Tiranga Pro Ultra | Next-Gen Gaming Platform</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', system-ui, -apple-system, 'Segoe UI', sans-serif;
        }

        :root {
            --bg-dark: #0A0E1A;
            --bg-card: rgba(18, 24, 38, 0.85);
            --primary: #FF6B35;
            --gold: #FFD700;
            --text-light: #F0F3FA;
            --text-muted: #8E96B0;
            --glass-border: rgba(255, 255, 255, 0.08);
            --danger: #FF3B5C;
            --success: #00E676;
        }

        body {
            background: radial-gradient(circle at 10% 20%, #12182A, #0A0E1A);
            color: var(--text-light);
            min-height: 100vh;
            overflow-x: hidden;
            padding-bottom: 80px;
        }

        .glass-card {
            background: var(--bg-card);
            backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: 28px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.3);
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary), #E85D2C);
            border: none;
            padding: 12px 24px;
            border-radius: 40px;
            font-weight: 600;
            color: white;
            cursor: pointer;
            transition: 0.2s;
            box-shadow: 0 6px 14px rgba(255, 107, 53, 0.3);
        }
        .btn-primary:active { transform: scale(0.96); }

        .vip-badge {
            background: linear-gradient(135deg, var(--gold), #E6B800);
            color: #0A0E1A;
            font-weight: bold;
            border-radius: 40px;
            padding: 4px 12px;
            font-size: 0.7rem;
        }

        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(10, 14, 26, 0.95);
            backdrop-filter: blur(20px);
            border-top: 1px solid var(--glass-border);
            display: flex;
            justify-content: space-around;
            padding: 10px 16px 20px;
            z-index: 1000;
        }
        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            color: var(--text-muted);
            font-size: 0.7rem;
            cursor: pointer;
        }
        .nav-item.active { color: var(--primary); transform: translateY(-4px); }
        .nav-item i { font-size: 1.6rem; }

        .container {
            max-width: 600px;
            margin: 0 auto;
            padding: 16px 16px 20px;
        }

        .game-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 16px;
            margin: 16px 0;
        }
        .game-card {
            background: rgba(28, 36, 56, 0.7);
            backdrop-filter: blur(8px);
            border-radius: 24px;
            padding: 16px 8px;
            text-align: center;
            cursor: pointer;
            border: 1px solid rgba(255,107,53,0.2);
        }
        .game-card:hover { transform: translateY(-5px); border-color: var(--primary);}
        
        .balance-chip {
            background: rgba(0,0,0,0.5);
            border-radius: 40px;
            padding: 6px 16px;
            font-weight: bold;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .hide { display: none; }
        
        .bet-panel {
            margin-top: 16px;
            padding: 16px;
            background: rgba(0,0,0,0.4);
            border-radius: 24px;
        }
        .bet-input {
            background: #1E2438;
            border: 1px solid #2a3450;
            border-radius: 40px;
            padding: 12px 16px;
            color: white;
            width: 100%;
            margin: 8px 0;
        }
        .toast-msg {
            position: fixed;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%);
            background: #1E2A3A;
            color: white;
            padding: 8px 20px;
            border-radius: 40px;
            z-index: 1100;
            font-size: 0.8rem;
        }
        .result-win { color: var(--success); font-weight: bold; }
        .result-lose { color: var(--danger); font-weight: bold; }
        .stat-card {
            background: rgba(0,0,0,0.3);
            border-radius: 20px;
            padding: 12px;
            text-align: center;
        }
        .marquee {
            background: rgba(0,0,0,0.5);
            border-radius: 40px;
            padding: 8px 16px;
            font-size: 0.8rem;
            white-space: nowrap;
            overflow: hidden;
            animation: scrollText 10s linear infinite;
        }
        @keyframes scrollText {
            0% { transform: translateX(100%); }
            100% { transform: translateX(-100%); }
        }
        @media (max-width: 500px) { .game-grid { grid-template-columns: 1fr 1fr; } }
    </style>
</head>
<body>
<div id="appRoot">Loading...</div>

<script>
    // Firebase Config
    const firebaseConfig = {
        apiKey: "AIzaSyDummyKeyForDemoPurposesOnly",
        authDomain: "admin-ff5c3.firebaseapp.com",
        databaseURL: "https://admin-ff5c3-default-rtdb.firebaseio.com/",
        projectId: "admin-ff5c3",
        storageBucket: "admin-ff5c3.appspot.com",
        messagingSenderId: "123456789012",
        appId: "1:123456789012:web:abcd1234"
    };
    
    if (!firebase.apps.length) {
        firebase.initializeApp(firebaseConfig);
    }
    const db = firebase.database();
    const auth = firebase.auth();
    auth.setPersistence(firebase.auth.Auth.Persistence.LOCAL).catch(e=>console.log(e));

    let currentUser = null;
    let userData = null;
    let userBalance = 0;
    let currentPage = 'home';

    function showToast(msg, isError = false) {
        let toast = document.createElement('div');
        toast.className = 'toast-msg';
        toast.style.background = isError ? '#FF3B5C' : '#1E2A3A';
        toast.innerText = msg;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 2800);
    }

    function processGameResult(game, betAmount) {
        let win = false;
        let multiplier = 1;
        
        switch(game) {
            case 'colorTrading': win = Math.random() > 0.48; multiplier = win ? 1.92 : 0; break;
            case 'mines': win = Math.random() > 0.35; multiplier = win ? 2.45 : 0; break;
            case 'keno': win = Math.random() > 0.42; multiplier = win ? 2.95 : 0; break;
            case 'balloon': win = Math.random() > 0.53; multiplier = win ? 1.68 : 0; break;
            case 'hotlineSlots': win = Math.random() > 0.6; multiplier = win ? 3.9 : 0; break;
            default: return { win: false, winAmount: 0 };
        }
        
        let winAmount = betAmount * multiplier;
        
        if(win && currentUser) {
            let uid = currentUser.uid;
            db.ref(`balances/${uid}/main`).transaction(b => (b || 0) + winAmount);
            db.ref(`transactions/${uid}`).push({ 
                type: 'game_win', game: game, amount: winAmount, bet: betAmount, date: Date.now() 
            });
        } else if(!win && betAmount > 0 && currentUser) {
            let uid = currentUser.uid;
            db.ref(`balances/${uid}/main`).transaction(b => (b || 0) - betAmount);
            db.ref(`transactions/${uid}`).push({ 
                type: 'game_loss', game: game, amount: betAmount, date: Date.now() 
            });
        }
        return { win, winAmount };
    }

    async function fetchUserData() {
        if(!currentUser) return;
        let uid = currentUser.uid;
        try {
            let snap = await db.ref(`users/${uid}`).once('value');
            userData = snap.val() || {};
            let balSnap = await db.ref(`balances/${uid}`).once('value');
            let balData = balSnap.val() || { main: 500 };
            userBalance = balData.main || 500;
            if(!balSnap.val()) {
                await db.ref(`balances/${uid}`).set({ main: 500, bonus: 0, cashback: 0 });
            }
            if(!userData.referralCode) {
                let code = (currentUser.uid.slice(-6) + Math.floor(Math.random()*1000)).toUpperCase();
                await db.ref(`users/${uid}`).update({ referralCode: code });
                userData.referralCode = code;
            }
        } catch(e) {
            console.warn(e);
            userBalance = 500;
        }
    }

    const appRoot = document.getElementById('appRoot');

    function render() {
        if (!currentUser) {
            renderLoginScreen();
        } else {
            renderMainApp();
        }
    }

    function renderLoginScreen() {
        appRoot.innerHTML = `
            <div class="container" style="display:flex; flex-direction:column; justify-content:center; min-height:100vh;">
                <div class="glass-card" style="padding:32px 24px; text-align:center;">
                    <i class="fas fa-flag-checkered" style="font-size:4rem; color:var(--primary);"></i>
                    <h2 style="margin:16px 0; background:linear-gradient(135deg,#FF6B35,#FFD700); -webkit-background-clip:text; background-clip:text; color:transparent;">Tiranga Pro Ultra</h2>
                    <p style="color:var(--text-muted);">Next-Gen Gaming Platform</p>
                    
                    <div style="display:flex; gap:12px; margin:20px 0;">
                        <button id="showEmailLoginBtn" class="btn-primary" style="flex:1;">Email Login</button>
                        <button id="showSignupBtn" class="btn-primary" style="flex:1; background:#2A3350;">Sign Up</button>
                    </div>
                    
                    <div id="loginPanel">
                        <input type="email" id="loginEmail" placeholder="Email" style="width:100%; padding:12px; border-radius:40px; margin:8px 0; background:#1E2438; border:none; color:white;">
                        <input type="password" id="loginPassword" placeholder="Password" style="width:100%; padding:12px; border-radius:40px; margin:8px 0; background:#1E2438; border:none; color:white;">
                        <button id="doLoginBtn" class="btn-primary" style="width:100%;">Login</button>
                    </div>
                    
                    <div id="signupPanel" class="hide">
                        <input type="email" id="signupEmail" placeholder="Email" style="width:100%; padding:12px; border-radius:40px; margin:8px 0; background:#1E2438; border:none; color:white;">
                        <input type="password" id="signupPass" placeholder="Password" style="width:100%; padding:12px; border-radius:40px; margin:8px 0; background:#1E2438; border:none; color:white;">
                        <input type="text" id="signupMobile" placeholder="Mobile Number" style="width:100%; padding:12px; border-radius:40px; margin:8px 0; background:#1E2438; border:none; color:white;">
                        <button id="doSignupBtn" class="btn-primary" style="width:100%;">Create Account (Get ₹500 Bonus)</button>
                    </div>
                    
                    <div style="margin-top:20px; font-size:0.8rem; color:var(--text-muted);">
                        <i class="fas fa-shield-alt"></i> Secure Platform | 24/7 Support
                    </div>
                </div>
            </div>
        `;
        
        document.getElementById('showEmailLoginBtn')?.addEventListener('click', () => {
            document.getElementById('loginPanel').classList.remove('hide');
            document.getElementById('signupPanel').classList.add('hide');
        });
        
        document.getElementById('showSignupBtn')?.addEventListener('click', () => {
            document.getElementById('loginPanel').classList.add('hide');
            document.getElementById('signupPanel').classList.remove('hide');
        });
        
        document.getElementById('doLoginBtn')?.addEventListener('click', async () => {
            let email = document.getElementById('loginEmail').value;
            let pwd = document.getElementById('loginPassword').value;
            if(!email || !pwd) return showToast('Enter email and password', true);
            try {
                let cred = await auth.signInWithEmailAndPassword(email, pwd);
                currentUser = cred.user;
                await fetchUserData();
                render();
            } catch(e) { showToast('Login failed: ' + e.message, true); }
        });
        
        document.getElementById('doSignupBtn')?.addEventListener('click', async () => {
            let email = document.getElementById('signupEmail').value;
            let pwd = document.getElementById('signupPass').value;
            let mobile = document.getElementById('signupMobile').value;
            if(!email || !pwd) return showToast('Email & password required', true);
            try {
                let userCred = await auth.createUserWithEmailAndPassword(email, pwd);
                let uid = userCred.user.uid;
                let refCode = (uid.slice(-6) + Math.floor(Math.random()*10000)).toUpperCase();
                await db.ref(`users/${uid}`).set({ 
                    email, mobile, createdAt: Date.now(), role: 'user', vip: 0, 
                    referralCode: refCode, totalWon: 0
                });
                await db.ref(`balances/${uid}`).set({ main: 500, bonus: 0, cashback: 0 });
                currentUser = userCred.user;
                await fetchUserData();
                render();
                showToast('Account created! Welcome bonus ₹500!');
            } catch(e) { showToast('Signup error: ' + e.message, true); }
        });
    }

    function renderMainApp() {
        let vipLevel = userData?.vip || 0;
        
        let pageContent = '';
        if(currentPage === 'home') pageContent = renderHomePage();
        else if(currentPage === 'games') pageContent = renderGamesPage();
        else if(currentPage === 'wallet') pageContent = renderWalletPage();
        else if(currentPage === 'profile') pageContent = renderProfilePage();

        appRoot.innerHTML = `
            <div class="container">
                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:16px;">
                    <div style="display:flex; align-items:center; gap:8px;">
                        <i class="fas fa-crown" style="color:var(--gold); font-size:1.4rem;"></i> 
                        <strong style="font-size:1.2rem;">Tiranga Pro</strong>
                    </div>
                    <div class="balance-chip">
                        <i class="fas fa-wallet"></i> 
                        ₹<span id="liveWallet">${userBalance}</span>
                    </div>
                    <div>
                        <i class="fas fa-bell"></i> 
                        <span class="vip-badge">VIP ${vipLevel}</span>
                    </div>
                </div>
                <div id="dynamicPage">${pageContent}</div>
            </div>
            <div class="bottom-nav">
                <div class="nav-item ${currentPage==='home'?'active':''}" data-nav="home"><i class="fas fa-home"></i><span>Home</span></div>
                <div class="nav-item ${currentPage==='games'?'active':''}" data-nav="games"><i class="fas fa-dice-d6"></i><span>Games</span></div>
                <div class="nav-item ${currentPage==='wallet'?'active':''}" data-nav="wallet"><i class="fas fa-coins"></i><span>Wallet</span></div>
                <div class="nav-item ${currentPage==='profile'?'active':''}" data-nav="profile"><i class="fas fa-user"></i><span>Profile</span></div>
            </div>
        `;
        
        document.querySelectorAll('.nav-item').forEach(el => {
            let nav = el.getAttribute('data-nav');
            if(nav) el.addEventListener('click', () => { currentPage = nav; render(); });
        });
        
        if(currentUser) {
            db.ref(`balances/${currentUser.uid}`).on('value', (snap) => {
                let val = snap.val() || {};
                userBalance = val.main || 0;
                let walletSpan = document.getElementById('liveWallet');
                if(walletSpan) walletSpan.innerText = userBalance;
            });
        }
        
        setTimeout(attachEvents, 100);
    }

    function attachEvents() {
        // Home page game cards
        document.querySelectorAll('[data-game]').forEach(card => {
            card.addEventListener('click', () => {
                let game = card.getAttribute('data-game');
                if(game) quickPlayGame(game);
            });
        });
        
        document.getElementById('claimDailyBonus')?.addEventListener('click', async () => {
            if(currentUser) {
                await db.ref(`balances/${currentUser.uid}/main`).transaction(b => (b || 0) + 50);
                showToast('Claimed ₹50 Daily Bonus!');
            }
        });
        
        document.getElementById('copyReferralBtn')?.addEventListener('click', () => {
            let code = userData?.referralCode || 'TIRANGA123';
            navigator.clipboard.writeText(code);
            showToast('Referral code copied!');
        });
        
        document.getElementById('depositBtn')?.addEventListener('click', () => {
            showToast('Demo Deposit: Add money feature coming soon');
        });
        
        document.getElementById('withdrawBtn')?.addEventListener('click', () => {
            showToast('Withdrawal: Minimum ₹500 required');
        });
        
        document.getElementById('logoutBtn')?.addEventListener('click', async () => {
            await auth.signOut();
            currentUser = null;
            render();
        });
    }

    function quickPlayGame(game) {
        let betAmount = 100;
        if(userBalance < betAmount) {
            showToast("Insufficient balance! Need ₹100", true);
            return;
        }
        let { win, winAmount } = processGameResult(game, betAmount);
        if(win) showToast(`🎉 You won ₹${winAmount.toFixed(2)} in ${game}!`, false);
        else showToast(`😞 You lost ₹${betAmount} in ${game}`, true);
    }

    window.openGamePanel = function(game) {
        let panelDiv = document.getElementById('gameBetPanel');
        if(!panelDiv) return;
        panelDiv.innerHTML = `
            <div class="bet-panel">
                <h4>${game.toUpperCase()} - Place Bet</h4>
                <input type="number" id="betAmountInput" class="bet-input" placeholder="Enter amount" value="100" min="10">
                <button id="executeGameBtn" class="btn-primary" style="width:100%; margin-top:8px;">Play Now</button>
                <div id="gameSpecificResult" style="margin-top:12px;"></div>
            </div>
        `;
        document.getElementById('executeGameBtn')?.addEventListener('click', async () => {
            let amount = parseFloat(document.getElementById('betAmountInput')?.value);
            if(isNaN(amount) || amount < 10) return showToast("Min bet ₹10", true);
            if(amount > userBalance) return showToast("Insufficient balance", true);
            let { win, winAmount } = processGameResult(game, amount);
            let resultDiv = document.getElementById('gameSpecificResult');
            if(win) {
                resultDiv.innerHTML = `<div class="result-win">🎉 WIN! You won ₹${winAmount.toFixed(2)}</div>`;
                showToast(`🎉 You won ₹${winAmount.toFixed(2)}!`, false);
            } else {
                resultDiv.innerHTML = `<div class="result-lose">💔 LOSS! You lost ₹${amount}</div>`;
                showToast(`😞 You lost ₹${amount}`, true);
            }
            setTimeout(() => { if(resultDiv) resultDiv.innerHTML = ''; }, 3000);
        });
    };

    function renderHomePage() {
        return `
            <div class="glass-card" style="margin-bottom:16px; text-align:center; padding:18px;">
                <i class="fas fa-gift" style="font-size:2rem; color:var(--gold);"></i>
                <h3>Welcome Bonus 50%</h3>
                <p>Get upto ₹5000 on first deposit</p>
            </div>
            <div class="marquee">
                <i class="fas fa-bullhorn"></i> 🎉 New Year Bonanza! Daily cashback 10% | Refer & Earn ₹200
            </div>
            <div style="display:flex; gap:12px; margin:16px 0;">
                <div class="stat-card" style="flex:1;"><i class="fas fa-users"></i><div>Active Players</div><strong>1,234+</strong></div>
                <div class="stat-card" style="flex:1;"><i class="fas fa-trophy"></i><div>Today's Winners</div><strong>456</strong></div>
            </div>
            <h3><i class="fas fa-fire" style="color:var(--primary);"></i> Trending Games</h3>
            <div class="game-grid">
                <div class="game-card" data-game="colorTrading"><i class="fas fa-chart-line"></i><div>Color Trading</div><small>1.92x</small></div>
                <div class="game-card" data-game="mines"><i class="fas fa-bomb"></i><div>Mines</div><small>2.45x</small></div>
                <div class="game-card" data-game="keno"><i class="fas fa-dice"></i><div>Keno</div><small>2.95x</small></div>
                <div class="game-card" data-game="balloon"><i class="fas fa-futbol"></i><div>Balloon</div><small>1.68x</small></div>
                <div class="game-card" data-game="hotlineSlots"><i class="fas fa-slot-machine"></i><div>Hotline Slots</div><small>3.9x</small></div>
            </div>
            <div class="glass-card" style="padding:12px; margin:12px 0; display:flex; justify-content:space-between; align-items:center;">
                <span><i class="fas fa-gift"></i> 🎁 Daily Bonus</span>
                <button id="claimDailyBonus" class="btn-primary" style="padding:8px 20px;">Claim ₹50</button>
            </div>
            <div class="glass-card" style="padding:12px; display:flex; justify-content:space-between; align-items:center;">
                <span><i class="fas fa-users"></i> Refer & Earn ₹200</span>
                <button id="copyReferralBtn" class="btn-primary" style="padding:6px 12px;">Copy Code</button>
            </div>
        `;
    }

    function renderGamesPage() {
        return `
            <div class="glass-card" style="padding:20px;">
                <h3><i class="fas fa-gamepad"></i> All Games</h3>
                <div class="game-grid">
                    <div class="game-card" onclick="openGamePanel('colorTrading')"><div style="font-size:2rem;">🎨</div><div>Color Trading</div><small>1.92x</small></div>
                    <div class="game-card" onclick="openGamePanel('mines')"><div style="font-size:2rem;">💣</div><div>Mines</div><small>2.45x</small></div>
                    <div class="game-card" onclick="openGamePanel('keno')"><div style="font-size:2rem;">🎯</div><div>Keno</div><small>2.95x</small></div>
                    <div class="game-card" onclick="openGamePanel('balloon')"><div style="font-size:2rem;">🎈</div><div>Balloon</div><small>1.68x</small></div>
                    <div class="game-card" onclick="openGamePanel('hotlineSlots')"><div style="font-size:2rem;">🎰</div><div>Hotline Slots</div><small>3.9x</small></div>
                </div>
                <div id="gameBetPanel"></div>
            </div>
        `;
    }

    function renderWalletPage() {
        return `
            <div class="glass-card" style="padding:24px; text-align:center;">
                <i class="fas fa-wallet" style="font-size:3rem; color:var(--gold);"></i>
                <h2>Total Balance</h2>
                <div style="font-size:3rem; font-weight:bold; color:var(--primary);">₹${userBalance}</div>
                <div style="display:flex; gap:12px; margin:20px 0;">
                    <button id="depositBtn" class="btn-primary" style="flex:1;"><i class="fas fa-plus"></i> Deposit</button>
                    <button id="withdrawBtn" class="btn-primary" style="flex:1; background:#2C3E66;"><i class="fas fa-minus"></i> Withdraw</button>
                </div>
            </div>
        `;
    }

    function renderProfilePage() {
        return `
            <div class="glass-card" style="padding:24px; text-align:center;">
                <i class="fas fa-user-circle" style="font-size:4rem; color:var(--primary);"></i>
                <h3>${currentUser?.email || 'User'}</h3>
                <p><i class="fas fa-tag"></i> Referral Code: <strong>${userData?.referralCode || 'N/A'}</strong></p>
                <p><i class="fas fa-trophy"></i> Total Wins: ₹${userData?.totalWon || 0}</p>
                <button id="logoutBtn" class="btn-primary" style="margin-top:20px; background:#FF3B5C;"><i class="fas fa-sign-out-alt"></i> Logout</button>
            </div>
        `;
    }

    // Auto-check for existing session
    auth.onAuthStateChanged(async (user) => {
        if (user) {
            currentUser = user;
            await fetchUserData();
            render();
        } else {
            currentUser = null;
            render();
        }
    });
</script>
</body>
</html>
